async function spGetToken() {
  if (!window.msalInstance) throw new Error("MSAL not initialized");
  const acct = window.msalInstance.getAllAccounts()[0];
  if (!acct) throw new Error("Not signed in");
  try {
    const r = await window.msalInstance.acquireTokenSilent({
      scopes: ["https://graph.microsoft.com/Files.ReadWrite.All"],
      account: acct,
    });
    return r.accessToken;
  } catch (e) {
    // Fallback: interactive
    const r = await window.msalInstance.acquireTokenPopup({
      scopes: ["https://graph.microsoft.com/Files.ReadWrite.All"],
    });
    return r.accessToken;
  }
}

function spEncodePath(path) {
  return path.split("/").map(encodeURIComponent).join("/");
}

function spFolderPath(playSlug, stage) {
  const folder = SP.stageFolders[stage] || SP.stageFolders.sources;
  return `${SP.channelRoot}/${playSlug}/${folder}`;
}

// Simple PUT upload (files < 4 MB)
async function _simpleUpload(token, filePath, file) {
  const url = `https://graph.microsoft.com/v1.0/drives/${SP.driveId}/root:/${spEncodePath(filePath)}:/content`;
  const res = await fetch(url, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": file.type || "application/octet-stream",
    },
    body: file,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Upload failed (${res.status})`);
  }
  return await res.json();
}

// Upload session for large files (>= 4 MB)
async function _sessionUpload(token, filePath, file, onProgress) {
  const sessionUrl = `https://graph.microsoft.com/v1.0/drives/${SP.driveId}/root:/${spEncodePath(filePath)}:/createUploadSession`;
  const sessRes = await fetch(sessionUrl, {
    method: "POST",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ item: { "@microsoft.graph.conflictBehavior": "rename" } }),
  });
  if (!sessRes.ok) throw new Error(`Session create failed (${sessRes.status})`);
  const { uploadUrl } = await sessRes.json();

  const CHUNK = 5 * 1024 * 1024; // 5 MB per chunk
  let offset = 0;
  let result = null;

  while (offset < file.size) {
    const end = Math.min(offset + CHUNK, file.size);
    const chunk = file.slice(offset, end);
    const res = await fetch(uploadUrl, {
      method: "PUT",
      headers: {
        "Content-Length": `${chunk.size}`,
        "Content-Range": `bytes ${offset}-${end - 1}/${file.size}`,
      },
      body: chunk,
    });
    offset = end;
    if (onProgress) onProgress(Math.round((offset / file.size) * 100));
    if (res.status === 200 || res.status === 201) {
      result = await res.json();
    } else if (res.status !== 202) {
      throw new Error(`Chunk failed (${res.status})`);
    }
  }
  return result;
}

// PUBLIC: Upload one File object to a play's stage folder in Teams
// playSlug = "CAIO Elevate" | "CMO Elevate" | etc.
// stage    = "sources" | "narrative" | "arc" | "storyboard" | "deck"
async function spUpload(file, playSlug, stage = "sources", onProgress) {
  const token = await spGetToken();
  const path = `${spFolderPath(playSlug, stage)}/${file.name}`;
  if (file.size < 4 * 1024 * 1024) {
    return _simpleUpload(token, path, file);
  }
  return _sessionUpload(token, path, file, onProgress);
}

// PUBLIC: Create the 5 stage folders for a new play (idempotent — ignores "already exists")
async function spEnsureFolders(playSlug) {
  const token = await spGetToken();
  const playPath = `${SP.channelRoot}/${playSlug}`;
  const url = `https://graph.microsoft.com/v1.0/drives/${SP.driveId}/root:/${spEncodePath(playPath)}:/children`;

  const seen = new Set();
  for (const name of Object.values(SP.stageFolders)) {
    if (seen.has(name)) continue;
    seen.add(name);
    await fetch(url, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ name, folder: {}, "@microsoft.graph.conflictBehavior": "fail" }),
    }).catch(() => {}); // silently ignore "already exists"
  }
}

// PUBLIC: List files in a play's stage folder
async function spListFiles(playSlug, stage = "sources") {
  const token = await spGetToken();
  const path = spFolderPath(playSlug, stage);
  const url = `https://graph.microsoft.com/v1.0/drives/${SP.driveId}/root:/${spEncodePath(path)}:/children`;
  const res = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
  if (!res.ok) return [];
  const data = await res.json();
  return (data.value || []).map(i => ({
    id: i.id,
    name: i.name,
    size: i.size,
    modified: i.lastModifiedDateTime,
    webUrl: i.webUrl,
    mimeType: i.file?.mimeType,
  }));
}

// Approval state — stored in localStorage keyed per play + stage
// (Upgrade path: swap for a SharePoint JSON write later)
const APPROVAL_KEY = (playSlug, stageIdx) => `cxo-approval:${playSlug}:${stageIdx}`;

function spGetApproval(playSlug, stageIdx) {
  try {
    const raw = localStorage.getItem(APPROVAL_KEY(playSlug, stageIdx));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function spSetApproval(playSlug, stageIdx, by) {
  const data = { approved: true, by, at: new Date().toISOString() };
  localStorage.setItem(APPROVAL_KEY(playSlug, stageIdx), JSON.stringify(data));
  return data;
}

function spClearApproval(playSlug, stageIdx) {
  localStorage.removeItem(APPROVAL_KEY(playSlug, stageIdx));
}

// ── spCreatePlay: Write a new play to the T24 Plays SharePoint list ──
// Site: https://thebln24.sharepoint.com/sites/AWST24
// List: T24 Plays (dynamically resolved by name — Danny creates the list)
// Requires Sites.ReadWrite.All scope in addition to Files.ReadWrite.All.

let _t24PlaysSiteId = null;
let _t24PlaysListId = null;

async function spGetSiteToken() {
  if (!window.msalInstance) throw new Error("MSAL not initialized");
  const acct = window.msalInstance.getAllAccounts()[0];
  if (!acct) throw new Error("Not signed in");
  try {
    const r = await window.msalInstance.acquireTokenSilent({
      scopes: ["https://graph.microsoft.com/Sites.ReadWrite.All"],
      account: acct,
    });
    return r.accessToken;
  } catch {
    const r = await window.msalInstance.acquireTokenPopup({
      scopes: ["https://graph.microsoft.com/Sites.ReadWrite.All"],
    });
    return r.accessToken;
  }
}

async function _resolvePlaysListIds(token) {
  if (_t24PlaysSiteId && _t24PlaysListId) {
    return { siteId: _t24PlaysSiteId, listId: _t24PlaysListId };
  }

  // 1. Resolve site
  const siteRes = await fetch(
    "https://graph.microsoft.com/v1.0/sites/thebln24.sharepoint.com:/sites/AWST24",
    { headers: { "Authorization": `Bearer ${token}` } }
  );
  if (!siteRes.ok) {
    const e = await siteRes.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Could not resolve AWST24 site (${siteRes.status})`);
  }
  const site = await siteRes.json();
  _t24PlaysSiteId = site.id;

  // 2. Find the T24 Plays list by display name
  const listRes = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${_t24PlaysSiteId}/lists?$filter=displayName eq 'T24 Plays'`,
    { headers: { "Authorization": `Bearer ${token}` } }
  );
  if (!listRes.ok) {
    const e = await listRes.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Could not query lists on AWST24 site (${listRes.status})`);
  }
  const listData = await listRes.json();
  const list = (listData.value || [])[0];
  if (!list) {
    throw new Error("T24 Plays list not found in the AWST24 site. Ask Danny to create it first.");
  }
  _t24PlaysListId = list.id;

  return { siteId: _t24PlaysSiteId, listId: _t24PlaysListId };
}

// PUBLIC: Create a new play item in the T24 Plays SharePoint list.
// formData: { title, persona, personaFull, industry, cohort[], dueDate, lead, team[] }
// Returns the new SharePoint list item ID (string).
async function spCreatePlay(formData) {
  const token = await spGetSiteToken();
  const { siteId, listId } = await _resolvePlaysListIds(token);

  const fields = {
    Title:        formData.title,
    Persona:      formData.persona,
    PersonaFull:  formData.personaFull,
    Industry:     formData.industry || "",
    Cohort:       JSON.stringify(formData.cohort || []),
    CohortSize:   (formData.cohort || []).length,
    Due:          formData.dueDate || null,
    Team:         JSON.stringify(formData.team || []),
    Lead:         formData.lead,
    StageIndex:   0,
    Status:       "Awaiting first draft",
    StatusKind:   "idle",
    Done:         false,
  };

  const res = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items`,
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type":  "application/json",
      },
      body: JSON.stringify({ fields }),
    }
  );

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Failed to create play in SharePoint (${res.status})`);
  }

  const item = await res.json();
  return item.id;
}

      "accent": "amber",

      amber:   { dark: "#f4b73f", deep: "#e09a1a", light: "#c8870c" },

      coral:   { dark: "#ff7a59", deep: "#e55a3a", light: "#d04a2a" },
      blue:    { dark: "#7aa7ff", deep: "#5a87df", light: "#3a67bf" },

      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState({ name: "login", projectId: null });

      const [inboxOpen, setInboxOpen] = React.useState(false);
      const [oqOpen, setOqOpen] = React.useState(false);
      const [shortcutsOpen, setShortcutsOpen] = React.useState(false);
      const [tweaksToggleSignal, setTweaksToggleSignal] = React.useState(0);

      // Apply theme + accent
      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      React.useEffect(() => {
        const palette = ACCENTS[tweaks.accent] || ACCENTS.amber;
        const accent = theme === "light" ? palette.light : palette.dark;
        document.documentElement.style.setProperty("--accent", accent);
        document.documentElement.style.setProperty("--bln-amber-deep", palette.deep);
        document.body.classList.toggle("grain", tweaks.grain !== false);
      }, [tweaks.accent, tweaks.grain, theme]);

      React.useEffect(() => { setTweak("theme", theme); }, [theme]);

      // Esc closes overlays
      React.useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") { setCmdOpen(false); setInboxOpen(false); setOqOpen(false); setShortcutsOpen(false); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const kbdHint = useKeyboardShortcuts({
        onPalette: () => setCmdOpen(o => !o),
        onShortcuts: () => setShortcutsOpen(o => !o),
        onInbox: () => setInboxOpen(o => !o),

      const [pendingPlay, setPendingPlay] = React.useState(null);

      const navigate = (name, projectId = null) => {
        setRoute({ name, projectId });
        window.scrollTo({ top: 0, behavior: "instant" });

      if (route.name === "login") return <LoginScreen onSignIn={() => navigate("dashboard")} />;

      return (

            current={route.name}
            onNav={(n) => navigate(n)}
            onOpenSearch={() => setCmdOpen(true)}
            onOpenInbox={() => setInboxOpen(true)}
            onOpenQuestions={() => setOqOpen(true)}
            theme={theme}
            setTheme={setThemeState}
            onNewProject={() => navigate("create")}
          />
          {route.name === "dashboard" && <Dashboard onOpenProject={(id) => navigate("workspace", id)} onNewProject={() => navigate("create")} onPlaysLoaded={(plays) => setLivePlays(plays)} />}
          {route.name === "create" && <CreatePlay onCancel={() => navigate("dashboard")} onCreated={(play) => { if (play && play.id) { setLivePlays(prev => [play, ...prev.filter(p => p.id !== play.id)]); navigate("workspace", play.id); } else { navigate("dashboard"); } }} />}
          {route.name === "workspace" && <Workspace project={livePlays.find(p => p.id === route.projectId) || null} onBack={() => navigate("dashboard")} onNav={navigate} onRefresh={(updatedPlay) => { if (updatedPlay) setLivePlays(prev => prev.map(p => p.id === updatedPlay.id ? updatedPlay : p)); }} />}
          {route.name === "library" && <Library onOpenProject={(id) => navigate("workspace", id)} />}
          {route.name === "calendar" && <CalendarPage />}
          {route.name === "templates" && <TemplatesPage onNav={navigate} />}
          {route.name === "runners" && <RunnersPage />}
          {route.name === "settings" && <SettingsPage />}

            <TweakSection title="Demo">
