<head>
  <meta charset="UTF-8">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
    /* === BLN24 / OpenClaw integration config === */
    window.BLN24_CONFIG = {
      tenantId: "bce59a38-0a4f-42df-8ff2-8d40797d61f1",
      clientId: "3ba92d21-924f-487e-b27d-59dc4ac44619",
      redirectUri: "https://projects.bln24.com/aws/",
      scopes: ["openid", "profile", "email", "User.Read", "https://graph.microsoft.com/Files.ReadWrite.All"],
      workspaceUrl: "https://workspace.bln24.com",
      agentsUrl: "https://agents.bln24.com"
    };
  </script>

  <!-- MSAL: unpkg (alcdn.msauth.net 3.10.0 returns 404) -->
  <script src="https://unpkg.com/@azure/msal-browser@3.10.0/lib/msal-browser.min.js"></script>
  <script>
    /* MSAL is a blocking script — msal is guaranteed defined here. */
    window.msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: window.BLN24_CONFIG.clientId,
        authority: "https://login.microsoftonline.com/" + window.BLN24_CONFIG.tenantId,
        redirectUri: window.BLN24_CONFIG.redirectUri,
        postLogoutRedirectUri: window.BLN24_CONFIG.redirectUri
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
    });
    window.msalReady = window.msalInstance.initialize();
  </script>
</head>
<body class="grain">
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="sp-upload.jsx"></script>
  <script type="text/babel" src="workspace-data.jsx?v=20260512a"></script>
  <script type="text/babel" src="login.jsx?v=20260512a"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="create.jsx"></script>
  <script type="text/babel" src="narrative-content.jsx"></script>
  <script type="text/babel" src="narrative-views.jsx"></script>
  <script type="text/babel" src="deck-content.jsx"></script>
  <script type="text/babel" src="decisions-log.jsx"></script>
  <script type="text/babel" src="runners-page.jsx"></script>
  <script type="text/babel" src="templates-page.jsx"></script>
  <script type="text/babel" src="settings-page.jsx"></script>
  <script type="text/babel" src="shortcuts.jsx"></script>
  <script type="text/babel" src="workspace.jsx"></script>
  <script type="text/babel" src="extras.jsx"></script>
  <script type="text/babel" src="open-questions.jsx"></script>
  <script type="text/babel" src="demo-guide.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "accent": "amber",
      "density": "comfortable",
      "displayFont": "Instrument Serif",
      "showAwsTag": true,
      "grain": true,
      "aiMode": "dock",
      "demoMode": false
    }/*EDITMODE-END*/;

    const ACCENTS = {
      amber:   { dark: "#f4b73f", deep: "#e09a1a", light: "#c8870c" },
      orange:  { dark: "#ff9900", deep: "#cc7700", light: "#cc7700" },
      coral:   { dark: "#ff7a59", deep: "#e55a3a", light: "#d04a2a" },
      blue:    { dark: "#7aa7ff", deep: "#5a87df", light: "#3a67bf" },
      lime:    { dark: "#a8e07a", deep: "#88c05a", light: "#5e9034" },
    };

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState({ name: "login", projectId: null });
      const [theme, setThemeState] = React.useState(tweaks.theme || "dark");
      const [cmdOpen, setCmdOpen] = React.useState(false);
      const [inboxOpen, setInboxOpen] = React.useState(false);
      const [oqOpen, setOqOpen] = React.useState(false);
      const [shortcutsOpen, setShortcutsOpen] = React.useState(false);
      const [tweaksToggleSignal, setTweaksToggleSignal] = React.useState(0);

      // Apply theme + accent
      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      React.useEffect(() => {
        const palette = ACCENTS[tweaks.accent] || ACCENTS.amber;
        const accent = theme === "light" ? palette.light : palette.dark;
        document.documentElement.style.setProperty("--accent", accent);
        document.documentElement.style.setProperty("--bln-amber-deep", palette.deep);
        document.body.classList.toggle("grain", tweaks.grain !== false);
      }, [tweaks.accent, tweaks.grain, theme]);

      React.useEffect(() => { setTweak("theme", theme); }, [theme]);

      // Esc closes overlays
      React.useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") { setCmdOpen(false); setInboxOpen(false); setOqOpen(false); setShortcutsOpen(false); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const kbdHint = useKeyboardShortcuts({
        onPalette: () => setCmdOpen(o => !o),
        onShortcuts: () => setShortcutsOpen(o => !o),
        onInbox: () => setInboxOpen(o => !o),
        onQuestions: () => setOqOpen(o => !o),
        onTweaks: () => setTweaksToggleSignal(s => s + 1),
        onNav: (name) => navigate(name),
      });

      const navigate = (name, projectId = null) => {
        setRoute({ name, projectId });
        window.scrollTo({ top: 0, behavior: "instant" });
      };

      if (route.name === "login") return <LoginScreen onSignIn={() => navigate("dashboard")} />;

      return (
        <>
          <Topbar
            current={route.name}
            onNav={(n) => navigate(n)}
            onOpenSearch={() => setCmdOpen(true)}
            onOpenInbox={() => setInboxOpen(true)}
            onOpenQuestions={() => setOqOpen(true)}
            theme={theme}
            setTheme={setThemeState}
            onNewProject={() => navigate("create")}
          />
          {route.name === "dashboard" && <Dashboard onOpenProject={(id) => navigate("workspace", id)} onNewProject={() => navigate("create")} />}
          {route.name === "create" && <CreatePlay onCancel={() => navigate("dashboard")} onCreate={() => navigate("workspace", "cmo-2026")} />}
          {route.name === "workspace" && <Workspace projectId={route.projectId} onBack={() => navigate("dashboard")} onNav={navigate} aiMode={tweaks.aiMode} />}
          {route.name === "library" && <Library onOpenProject={(id) => navigate("workspace", id)} />}
          {route.name === "calendar" && <CalendarPage />}
          {route.name === "templates" && <TemplatesPage onNav={navigate} />}
          {route.name === "runners" && <RunnersPage />}
          {route.name === "settings" && <SettingsPage />}

          <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} onNav={navigate} />
          <Inbox open={inboxOpen} onClose={() => setInboxOpen(false)} onNav={navigate} />
          <OpenQuestions open={oqOpen} onClose={() => setOqOpen(false)} />
          <OpenQuestionsToast />
          <ShortcutsSheet open={shortcutsOpen} onClose={() => setShortcutsOpen(false)} />
          <KbdHintToast hint={kbdHint} />
          <DemoGuide
            open={tweaks.demoMode}
            onClose={() => setTweak("demoMode", false)}
            onJump={(b) => navigate(b.route, b.projectId || null)}
          />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme">
              <TweakRadio label="Mode" value={theme} options={[{value:"dark",label:"Dark"},{value:"light",label:"Light"}]} onChange={setThemeState} />
              <TweakSelect label="Accent color" value={tweaks.accent} options={[
                {value:"amber",label:"BLN24 Amber"},
                {value:"orange",label:"AWS Orange"},
                {value:"coral",label:"Coral"},
                {value:"blue",label:"Cobalt"},
                {value:"lime",label:"Lime"},
              ]} onChange={v => setTweak("accent", v)} />
              <TweakToggle label="Film-grain texture" value={tweaks.grain !== false} onChange={v => setTweak("grain", v)} />
            </TweakSection>
            <TweakSection title="AI presence (T24)">
              <TweakRadio label="How visible is T24?" value={tweaks.aiMode} options={[
                {value:"dock",label:"Floating dock"},
                {value:"panel",label:"Side panel"},
                {value:"invisible",label:"Invisible"},
              ]} onChange={v => setTweak("aiMode", v)} />
            </TweakSection>
            <TweakSection title="Demo">
              <TweakToggle label="Demo mode (presenter guide)" value={!!tweaks.demoMode} onChange={v => setTweak("demoMode", v)} />
            </TweakSection>
            <TweakSection title="Branding">
              <TweakToggle label="Show AWS tag in header" value={tweaks.showAwsTag !== false} onChange={v => setTweak("showAwsTag", v)} />
            </TweakSection>
            <TweakSection title="Jump to">
              <TweakButton onClick={() => navigate("login")}>Login screen</TweakButton>
              <TweakButton onClick={() => navigate("dashboard")}>Dashboard</TweakButton>
              <TweakButton onClick={() => navigate("create")}>Create new play</TweakButton>
              <TweakButton onClick={() => navigate("workspace", "cmo-2026")}>Workspace · CMO Storyboard</TweakButton>
              <TweakButton onClick={() => navigate("workspace", "cto-bedrock")}>Workspace · CTO Narrative</TweakButton>
              <TweakButton onClick={() => navigate("workspace", "cxo-personal")}>Workspace · CXO Deck</TweakButton>
              <TweakButton onClick={() => navigate("library")}>Library</TweakButton>
              <TweakButton onClick={() => navigate("calendar")}>Calendar</TweakButton>
              <TweakButton onClick={() => navigate("templates")}>Templates</TweakButton>
              <TweakButton onClick={() => navigate("runners")}>Runners spec</TweakButton>
              <TweakButton onClick={() => navigate("settings")}>Settings</TweakButton>
              <TweakButton onClick={() => setShortcutsOpen(true)}>Keyboard shortcuts</TweakButton>
              <TweakButton onClick={() => setOqOpen(true)}>Open questions panel</TweakButton>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
